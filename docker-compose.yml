version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: judicial-auction-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    networks:
      - judicial-auction-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: judicial-auction-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - judicial-auction-network

networks:
  judicial-auction-network:
    driver: bridge
